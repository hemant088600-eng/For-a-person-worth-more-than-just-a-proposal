<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Diya ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe Script', cursive;
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
}

/* Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* Clouds */
.cloud {
  position: absolute;
  width: 200px;
  height: 60px;
  background: rgba(255,255,255,0.1);
  border-radius: 50px;
  filter: blur(20px);
  animation: moveClouds 60s linear infinite;
}

@keyframes moveClouds {
  from { transform: translateX(-300px); }
  to { transform: translateX(100vw); }
}

/* Golden Letter */
.letter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scaleY(0);
  width: 85%;
  max-width: 350px;
  height: 70%;
  background: linear-gradient(145deg, #ffd700, #ffcc00, #e6b800);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(255,215,0,0.6);
  transform-origin: top;
  transition: transform 1s ease;
  overflow-y: auto;
}

.open {
  transform: translate(-50%, -50%) scaleY(1);
}

/* Text */
#text {
  font-size: 15px;
  color: #3b2f00;
  white-space: pre-line;
  line-height: 1.6;
}

/* Button */
.openBtn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: gold;
  color: black;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 10px gold;
}

/* Response */
.response {
  display: none;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

button.send {
  margin-top: 10px;
  background: black;
  color: gold;
}

/* Final */
.final {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  color: gold;
  display: none;
}
</style>
</head>

<body>

<button class="openBtn" onclick="openLetter()">Open 💌</button>

<div class="letter" id="letter">
  <div id="text"></div>

  <div class="response" id="responseBox">
    <input type="text" id="reply" placeholder="Your answer... 😊">
    <button class="send" onclick="saveResponse()">Send ❤️</button>
  </div>
</div>

<div class="final" id="finalMsg"></div>

<script>
/* Stars */
for (let i = 0; i < 80; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.animationDuration = (Math.random() * 2 + 1) + "s";
  document.body.appendChild(star);
}

/* Clouds */
for (let i = 0; i < 3; i++) {
  let cloud = document.createElement("div");
  cloud.className = "cloud";
  cloud.style.top = Math.random() * 200 + "px";
  cloud.style.animationDuration = (40 + Math.random() * 30) + "s";
  document.body.appendChild(cloud);
}

/* Message */
const message = `Dear Diya 😊,

I don’t really know where to start,
but I’ve had a crush on you for a long time ❤️

I used to wait for your messages
and reply as quickly as I could 💬

Your sparkling smile ✨, your dazzling eyes 👀,
your beautiful charm...
somehow, they stayed with me.

Maybe it sounds simple,
but these feelings aren’t 💖

I was nervous to say this,
but today, with a little courage...

I really like you ❤️

Not casually,
but in a way my heart keeps choosing you,
again and again.

And I promise 🤝,
I won’t leave when you’re sad.
I’ll be there to make you smile 😊

So today,
with all my courage and warmth...

Will you be mine? 💌

— someone who truly cares ❤️`;

function openLetter() {
  document.querySelector(".openBtn").style.display = "none";
  let letter = document.getElementById("letter");
  letter.classList.add("open");
  typeText(message);
}

/* Typing */
function typeText(text) {
  let i = 0;
  let target = document.getElementById("text");

  function typing() {
    if (i < text.length) {
      target.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    } else {
      document.getElementById("responseBox").style.display = "block";
    }
  }
  typing();
}

/* Save */
function saveResponse() {
  let reply = document.getElementById("reply").value;
  localStorage.setItem("diya_response", reply);

  document.getElementById("letter").style.display = "none";
  document.getElementById("finalMsg").style.display = "block";
  document.getElementById("finalMsg").innerText =
    reply ? "She said: " + reply + " ❤️" : "You made this moment special ❤️";
}
</script>

</body>
</html>
