<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Diya ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

/* Glowing Name */
.title {
  position: absolute;
  top: 40px;
  font-size: 32px;
  color: white;
  text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d, 0 0 30px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff4d6d; }
}

/* Envelope */
.envelope {
  width: 260px;
  height: 190px;
  background: #fff;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6f91;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transition: transform 1s;
  transform-origin: top;
}

/* Letter */
.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 20px;
  box-sizing: border-box;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
  overflow-y: auto;
}

/* Open animation */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  opacity: 1;
  transform: translateY(0);
}

/* Text */
#text {
  font-size: 15px;
  color: #333;
  line-height: 1.6;
  white-space: pre-line;
}

/* Buttons */
.buttons {
  display: none;
  margin-top: 15px;
  text-align: center;
}

button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #ccc;
  position: relative;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}

/* Final message */
.final {
  position: absolute;
  font-size: 28px;
  color: white;
  text-align: center;
  display: none;
}
</style>
</head>

<body>

<div class="title">For Diya ❤️</div>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>
  <div class="letter">
    <div id="text"></div>

    <div class="buttons" id="buttons">
      <button class="yes" onclick="sayYes()">Yes ❤️</button>
      <button class="no" onmouseover="moveNo(this)">No</button>
    </div>

  </div>
</div>

<div class="final" id="finalMsg">You just made me the happiest person ❤️</div>

<script>
let opened = false;

const message = `Dear Diya,

I don’t really know where to start,
but I’ve had a crush on you for a long time.

I used to wait for your messages
and reply as quickly as I could.

Your sparkling smile, your dazzling eyes,
your beautiful charm...
somehow, they all stayed with me.

Maybe it sounds simple,
but these feelings aren’t.

I was nervous to say this,
but today, with a little courage,
I want to be honest...

I really like you.

Not casually, not just for a moment,
but in a way my heart keeps choosing you,
again and again.

And I promise,
I won’t disappear when you’re sad.
I’ll be there,
to listen, to support,
and to make you smile.

So today,
with all my courage and warmth...

Will you be mine?

— someone who truly cares ❤️`;

function openLetter() {
  if (opened) return;
  opened = true;

  document.querySelector('.envelope').classList.add('open');
  typeText(message);
  createHearts();
}

/* Typing effect */
function typeText(text) {
  let i = 0;
  let speed = 35;
  let target = document.getElementById("text");

  function typing() {
    if (i < text.length) {
      target.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      document.getElementById("buttons").style.display = "block";
    }
  }
  typing();
}

/* Move NO button */
function moveNo(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * 200 + "px";
  btn.style.left = Math.random() * 200 + "px";
}

/* YES clicked */
function sayYes() {
  document.querySelector('.envelope').style.display = "none";
  document.querySelector('.title').style.display = "none";
  document.getElementById("finalMsg").style.display = "block";
}

/* Floating hearts */
function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
