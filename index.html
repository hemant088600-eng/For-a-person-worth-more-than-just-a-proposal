<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Diya ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe Script', cursive;
  overflow: hidden;
}

/* Title */
.title {
  position: absolute;
  top: 20px;
  font-size: 28px;
  color: white;
  text-shadow: 0 0 15px #ff4d6d;
}

/* Envelope */
.envelope {
  width: 85%;
  max-width: 320px;
  height: 220px;
  background: #fff;
  position: relative;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6f91;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: transform 1s;
}

/* Letter */
.letter {
  position: absolute;
  width: 92%;
  height: 92%;
  background: #fff;
  top: 4%;
  left: 4%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
  overflow-y: auto;
}

/* Open animation */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  opacity: 1;
  transform: translateY(0);
}

/* Text */
#text {
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-line;
}

/* Buttons & input */
.response {
  display: none;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* Final */
.final {
  position: absolute;
  text-align: center;
  font-size: 24px;
  color: white;
  display: none;
}
</style>
</head>

<body>

<div class="title">For Diya ❤️</div>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>
  <div class="letter">
    <div id="text"></div>

    <div class="response" id="responseBox">
      <input type="text" id="reply" placeholder="Your answer... 💌">
      <button onclick="saveResponse()">Send ❤️</button>
    </div>

  </div>
</div>

<div class="final" id="finalMsg"></div>

<script>
let opened = false;

const message = `Dear Diya,

I don’t really know where to start,
but I’ve had a crush on you for a long time.

I used to wait for your messages
and reply as quickly as I could.

Your sparkling smile, your dazzling eyes,
your beautiful charm...
somehow, they all stayed with me.

Maybe it sounds simple,
but these feelings aren’t.

I was nervous to say this,
but today, with a little courage,
I want to be honest...

I really like you.

Not casually, not just for a moment,
but in a way my heart keeps choosing you,
again and again.

And I promise,
I won’t disappear when you’re sad.
I’ll be there,
to listen, to support,
and to make you smile.

So today,
with all my courage and warmth...

Will you be mine?

— someone who truly cares ❤️`;

function openLetter() {
  if (opened) return;
  opened = true;

  document.querySelector('.envelope').classList.add('open');
  typeText(message);
}

/* Typing */
function typeText(text) {
  let i = 0;
  let target = document.getElementById("text");

  function typing() {
    if (i < text.length) {
      target.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    } else {
      document.getElementById("responseBox").style.display = "block";
    }
  }
  typing();
}

/* Save response */
function saveResponse() {
  let reply = document.getElementById("reply").value;

  localStorage.setItem("diya_response", reply);

  document.querySelector('.envelope').style.display = "none";
  document.querySelector('.title').style.display = "none";

  document.getElementById("finalMsg").style.display = "block";
  document.getElementById("finalMsg").innerText =
    reply ? "She said: " + reply + " ❤️" : "You made this moment special ❤️";
}
</script>

</body>
</html>
